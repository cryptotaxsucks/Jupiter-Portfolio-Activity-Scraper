<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Jupiter Export</title>
  <style>
    body { font-family: system-ui, sans-serif; background:#0b1320; color:#fff; width:340px; margin:0; padding:12px; }
    h1 { font-size:16px; margin:0 0 8px; }
    label { display:block; font-size:12px; opacity:.8; margin-top:8px; }
    input[type=text], input[type=number] { width:100%; box-sizing:border-box; padding:6px 8px; border-radius:6px; border:1px solid #2a3345; background:#121b2c; color:#fff; }
    button { margin-top:12px; width:100%; padding:10px; border:0; border-radius:8px; background:#1f6feb; color:#fff; font-weight:600; cursor:pointer; }
    pre { margin-top:12px; height:160px; overflow:auto; background:#0f1524; border:1px solid #26314a; border-radius:6px; padding:8px; white-space:pre-wrap; }
    small { opacity:.7 }
  </style>
</head>
<body>
  <h1>Jupiter – Full CSV Export</h1>
  <label>Wallet Address (leave empty to auto-detect from current tab):</label>
  <input id="addr" type="text" placeholder="...">
  <div style="display:flex; gap:8px; align-items:center;">
    <div style="flex:1">
      <label>Page size (30–100)</label>
      <input id="limit" type="number" min="30" max="100" value="100">
    </div>
    <div style="flex:1">
      <label>&nbsp;</label>
      <button id="go" title="Start export">Export Full CSV</button>
    </div>
  </div>
  <pre id="status"></pre>
  <small>Tip: If headers aren’t captured yet, click “Load more” once on the site and try again.</small>
  <script src="popup.js"></script>
</body>
</html>
