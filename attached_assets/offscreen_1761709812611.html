<!doctype html>
<html>
<head><meta charset="utf-8"><title>Offscreen</title></head>
<body>
<script>
// Hold a long-lived port to keep service worker alive during long jobs.
let port = chrome.runtime.connect({name: "keepalive"});
port.onDisconnect.addListener(() => {
  // Reconnect if needed
  try { port = chrome.runtime.connect({name: "keepalive"}); } catch(e) {}
});
</script>
</body>
</html>
